<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7C3AED",
                        "background-dark": "#0A0A0F",
                        "secondary-text": "#9B9B9B",
                        "glass-bg": "rgba(255, 255, 255, 0.04)",
                        "glass-border": "rgba(255, 255, 255, 0.1)"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0A0A0F;
            color: #FFFFFF;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }
        .agent-glow {
            box-shadow: 0 0 15px #7C3AED;
        }
    </style>
</head>
<body class="font-display antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-center bg-background-dark p-8">
<header class="absolute top-12 flex flex-col items-center gap-4">
<h2 class="text-[14px] font-semibold tracking-[0.2em] text-white uppercase">NEXUS</h2>
<div class="h-[1px] w-10 bg-glass-border"></div>
</header>
<main class="flex flex-col items-center text-center max-w-2xl">
<h1 class="text-[48px] font-bold leading-tight tracking-tight text-white mb-4">
                Your AI Company
            </h1>
<p class="text-[16px] font-normal leading-relaxed text-secondary-text max-w-[400px] mb-12">
                Six agents. One machine. Zero cloud.
            </p>
<div class="flex items-center justify-center gap-4 mb-16">
<div class="size-2 rounded-full bg-primary"></div>
<div class="size-[6px] rounded-full bg-glass-border"></div>
<div class="size-[6px] rounded-full bg-glass-border"></div>
</div>
<div class="grid grid-cols-3 md:grid-cols-6 gap-6 mb-16">
<!-- Logic Agent -->
<div class="flex flex-col items-center justify-center w-24 h-[144px] glass-panel rounded-xl gap-4">
<div class="size-16 rounded-full flex items-center justify-center bg-primary/20 border border-primary/40 agent-glow">
<span class="material-symbols-outlined text-[24px] text-white">psychology</span>
</div>
<span class="text-[12px] font-medium text-secondary-text">Logic</span>
</div>
<!-- Dev Agent -->
<div class="flex flex-col items-center justify-center w-24 h-[144px] glass-panel rounded-xl gap-4">
<div class="size-16 rounded-full flex items-center justify-center bg-primary/20 border border-primary/40 agent-glow">
<span class="material-symbols-outlined text-[24px] text-white">code</span>
</div>
<span class="text-[12px] font-medium text-secondary-text">Dev</span>
</div>
<!-- Design Agent -->
<div class="flex flex-col items-center justify-center w-24 h-[144px] glass-panel rounded-xl gap-4">
<div class="size-16 rounded-full flex items-center justify-center bg-primary/20 border border-primary/40 agent-glow">
<span class="material-symbols-outlined text-[24px] text-white">draw</span>
</div>
<span class="text-[12px] font-medium text-secondary-text">Design</span>
</div>
<!-- Data Agent -->
<div class="flex flex-col items-center justify-center w-24 h-[144px] glass-panel rounded-xl gap-4">
<div class="size-16 rounded-full flex items-center justify-center bg-primary/20 border border-primary/40 agent-glow">
<span class="material-symbols-outlined text-[24px] text-white">query_stats</span>
</div>
<span class="text-[12px] font-medium text-secondary-text">Data</span>
</div>
<!-- Support Agent -->
<div class="flex flex-col items-center justify-center w-24 h-[144px] glass-panel rounded-xl gap-4">
<div class="size-16 rounded-full flex items-center justify-center bg-primary/20 border border-primary/40 agent-glow">
<span class="material-symbols-outlined text-[24px] text-white">chat</span>
</div>
<span class="text-[12px] font-medium text-secondary-text">Support</span>
</div>
<!-- Sec Agent -->
<div class="flex flex-col items-center justify-center w-24 h-[144px] glass-panel rounded-xl gap-4">
<div class="size-16 rounded-full flex items-center justify-center bg-primary/20 border border-primary/40 agent-glow">
<span class="material-symbols-outlined text-[24px] text-white">shield</span>
</div>
<span class="text-[12px] font-medium text-secondary-text">Sec</span>
</div>
</div>
<button class="flex items-center justify-center w-[240px] h-[48px] bg-primary text-white font-semibold text-[14px] rounded-full hover:opacity-90 transition-all active:scale-95">
                Get Started 
                <span class="material-symbols-outlined ml-2 text-[20px]">arrow_right_alt</span>
</button>
</main>
<footer class="absolute bottom-12 text-[10px] text-secondary-text tracking-widest uppercase opacity-60">
            End-to-end encrypted infrastructure
        </footer>
</div>
</body></html>
