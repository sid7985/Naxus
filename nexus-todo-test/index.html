<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS To-Do Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0a 70%);
        }
        .glass {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="root" class="w-full max-w-md p-6 glass rounded-2xl mx-4">
        <!-- React will mount here -->
    </div>

    <!-- React/Babel via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function AnimatedTodo() {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('nexus-todos');
                return saved ? JSON.parse(saved) : [
                    { id: 1, text: 'Deploy NEXUS AI OS', completed: true },
                    { id: 2, text: 'Initialize Multi-Agent Debate', completed: true },
                    { id: 3, text: 'Conquer the universe', completed: false }
                ];
            });
            const [input, setInput] = useState('');

            useEffect(() => {
                localStorage.setItem('nexus-todos', JSON.stringify(tasks));
            }, [tasks]);

            const addTask = (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                setTasks([...tasks, { id: Date.now(), text: input, completed: false }]);
                setInput('');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                            NEXUS Task Array
                        </h1>
                        <p className="text-sm text-gray-400 font-mono mt-1">Status: Operational</p>
                    </div>

                    <form onSubmit={addTask} className="flex gap-2">
                        <input 
                            type="text" 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Add directive..."
                            className="flex-1 bg-black/40 border border-white/10 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors"
                        />
                        <button type="submit" className="bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 px-4 py-2 rounded-lg text-sm font-medium hover:bg-cyan-500/30 transition-colors">
                            Execute
                        </button>
                    </form>

                    <div className="space-y-2 max-h-64 overflow-y-auto pr-2">
                        {tasks.length === 0 ? (
                            <div className="text-center py-8 text-gray-500 text-sm">No active directives.</div>
                        ) : (
                            tasks.map(task => (
                                <div key={task.id} className="flex items-center gap-3 bg-white/5 p-3 rounded-lg border border-white/5 group transition-all hover:bg-white/10">
                                    <button 
                                        onClick={() => toggleTask(task.id)}
                                        className={`w-5 h-5 rounded-full border flex items-center justify-center transition-colors ${task.completed ? 'bg-cyan-500 border-cyan-500' : 'border-gray-500'}`}
                                    >
                                        {task.completed && <svg className="w-3 h-3 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}
                                    </button>
                                    <span className={`flex-1 text-sm ${task.completed ? 'text-gray-500 line-through' : 'text-white'}`}>
                                        {task.text}
                                    </span>
                                    <button 
                                        onClick={() => deleteTask(task.id)}
                                        className="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 transition-opacity"
                                    >
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AnimatedTodo />);
    </script>
</body>
</html>
